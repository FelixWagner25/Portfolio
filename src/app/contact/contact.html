<section>
  @if ((language$ | async) === 'en') {
    <h1>Contact</h1>
    <div>
      <div class="subtitle">Let us get in touch!</div>
      <form class="contact-form">
        <mat-form-field appearance="outline" class="custom-text-input">
          <mat-label>Your name *</mat-label>
          <input type="text" id="contact-name" matInput />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Your email *</mat-label>
          <input name="contact-email" type="email" matInput />
        </mat-form-field>
        <mat-form-field appearance="outline" class="custom-textarea">
          <mat-label>Your message *</mat-label>
          <textarea id="contact-message" matInput rows="8"></textarea>
        </mat-form-field>
        <div class="checkbox-wrap">
          <mat-checkbox type="checkbox" name="contact-checkbox" id="input-checkbox" />
          <span
            >I read the <a>privacy policy</a> and agree to the processing of my data as outlined.
          </span>
        </div>

        <input class="btn-main btn-contact" type="submit" value="Send message" />
      </form>
    </div>
  }
  @if ((language$ | async) === 'de') {
    <h1>Kontakt</h1>
    <div class="subtitle">Lassen Sie uns ins Gespräch kommen!</div>
  }
</section>
