<div class="center-content sticky bg-color">
  <div class="max-width-1440px">
    <section>
      <a routerLink="">
        <img src="assets/img/initials_brackets_black_transparent.png" alt="Back home" />
      </a>
      <div class="menu-lang-wrap">
        <div class="lang-wrap">
          <button (click)="setLanguage('en')" [class.outlined]="(language$ | async) === 'en'">
            EN
          </button>
          <button (click)="setLanguage('de')" [class.outlined]="(language$ | async) === 'de'">
            DE
          </button>
        </div>
        <button (click)="toggleMenuOverlay()">
          <img src="assets/icons/menu.svg" alt="Menu" />
        </button>
      </div>
    </section>
  </div>
</div>
<app-menu-overlay [class.menu-closed]="!showOverlay" #menu></app-menu-overlay>
